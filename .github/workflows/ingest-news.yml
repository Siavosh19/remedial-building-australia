name: Daily News Ingestion

on:
  schedule:
    - cron: "0 20 * * *"  # 6am AEST (UTC+10) = 20:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news ingestion
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.remedialbuildingaustralia.com.au/api/ingest-news")
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "Ingestion returned non-200: $response"
            exit 1
          fi
          echo "News ingestion triggered successfully"
